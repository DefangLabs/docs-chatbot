services:
  rag-chatbot:
    restart: always
    domainname: ask.defang.io
    x-defang-dns-role: arn:aws:iam::258338292852:role/dnsadmin-39a19c3
    build:
      context: ./app
      shm_size: "16gb"
    ports:
      - target: 5000
        published: 5000
        protocol: tcp
        mode: ingress
    environment:
      FLASK_APP: app.py
      SECRET_KEY: 
      SEGMENT_WRITE_KEY: 
      SESSION_COOKIE_SECURE: 1
      OPENAI_API_KEY: secret
      OPENAI_BASE_URL: "http://localhost:8080/api/v1"
    command: uwsgi --http 0.0.0.0:5000 --wsgi-file app.py --callable app --processes 4 --threads 2
    deploy:
      resources:
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      #start_period: 40s

  bedrock:
    build:
      context: https://github.com/aws-samples/bedrock-access-gateway.git#main:/src
      dockerfile: Dockerfile_ecs
    ports:
      - target: 80
        published: 8080
        protocol: tcp
        mode: ingress
    environment:
      - AWS_REGION=us-west-2
      - AWS_PROFILE=defang-lab
      - API_KEY=secret
      - API_ROUTE_PREFIX=/api/v1
    volumes:
      - type: bind
        source: ~/.aws
        target: /root/.aws